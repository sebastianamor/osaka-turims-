{% extends "base.html" %}
{% block title %}Register – Osaka Explorer{% endblock %}
{% block extra_head %}
<style>
.auth-wrapper {
  min-height: calc(100vh - 64px);
  display: flex; align-items: center; justify-content: center;
  background: var(--paper); padding: 2rem;
}
.auth-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 2px;
  width: 100%; max-width: 420px; overflow: hidden;
}
.auth-header {
  background: var(--ink);
  padding: 2.5rem 2rem; text-align: center; position: relative;
}
.auth-kanji {
  font-family: 'Noto Serif JP', serif;
  font-size: 3rem; color: rgba(184,134,11,0.4); margin-bottom: 0.5rem;
}
.auth-title {
  font-family: 'Shippori Mincho', serif;
  font-size: 1.4rem; color: white; font-weight: 300; letter-spacing: 0.1em;
}
.auth-body { padding: 2rem; }
.form-group { margin-bottom: 1.1rem; }
.form-group label {
  display: block; font-size: 0.78rem;
  letter-spacing: 0.1em; color: var(--ink-soft); margin-bottom: 0.4rem;
  text-transform: uppercase;
}
.form-group input, .form-group select {
  width: 100%; padding: 0.7rem 1rem;
  border: 1px solid var(--border); border-radius: 2px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.95rem; color: var(--ink); background: var(--paper); outline: none;
  transition: border-color 0.2s;
}
.form-group input:focus, .form-group select:focus {
  border-color: var(--gold); background: var(--white);
}
.submit-btn {
  width: 100%; padding: 0.8rem;
  background: var(--red); color: white; border: none; border-radius: 2px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.95rem; letter-spacing: 0.08em;
  cursor: pointer; transition: background 0.2s; margin-top: 0.5rem;
}
.submit-btn:hover { background: #a93226; }
.auth-footer {
  text-align: center; padding: 1rem 2rem 1.5rem;
  font-size: 0.85rem; color: var(--ink-soft);
  border-top: 1px solid var(--border);
}
.auth-footer a { color: var(--red); text-decoration: none; }
</style>
{% endblock %}
{% block content %}
<div class="lang-bar">
  <span data-lang="en" onclick="setLang('en')">English</span>
  <span data-lang="es" onclick="setLang('es')">Español</span>
  <span data-lang="zh" onclick="setLang('zh')">中文</span>
</div>
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-kanji">登</div>
      <div class="auth-title" data-en="Create Account" data-es="Crear Cuenta" data-zh="创建账户">Create Account</div>
    </div>
    <form method="POST" class="auth-body">
      <div class="form-group">
        <label data-en="Username" data-es="Usuario" data-zh="用户名">Username</label>
        <input type="text" name="username" required>
      </div>
      <div class="form-group">
        <label data-en="Email" data-es="Correo Electrónico" data-zh="电子邮件">Email</label>
        <input type="email" name="email" required>
      </div>
      <div class="form-group">
        <label data-en="Password" data-es="Contraseña" data-zh="密码">Password</label>
        <input type="password" name="password" required minlength="6">
      </div>
      <div class="form-group">
        <label data-en="Preferred Language" data-es="Idioma Preferido" data-zh="首选语言">Preferred Language</label>
        <select name="language">
          <option value="en">English</option>
          <option value="es">Español</option>
          <option value="zh">中文</option>
        </select>
      </div>
      <button type="submit" class="submit-btn"
              data-en="Create My Account"
              data-es="Crear Mi Cuenta"
              data-zh="创建我的账户">Create My Account</button>
    </form>
    <div class="auth-footer">
      <span data-en="Already have an account?" data-es="¿Ya tienes cuenta?" data-zh="已有账户？">Already have an account?</span>
      <a href="/login" data-en="Sign in" data-es="Inicia sesión" data-zh="登录">Sign in</a>
    </div>
  </div>
</div>
{% endblock %}
